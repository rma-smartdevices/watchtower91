<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThriveNFC</title>
    <!--Designed and Developed by Ricardo Moreno Ayala. © 2026-->
    <style>
      * {
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }
      html {
        height: 100%;
        overflow: hidden;
        margin-top: 0;
      }

      a {
        text-decoration: none;
      }

      #plink:hover {
        color: white;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-image: linear-gradient(#0f1115, #000000);
      }

      header {
        color: #f0ecec;
        text-align: center;
        padding: 2rem 1rem 1rem 1rem;
        max-width: 420px;
        animation: fadeIn 0.5s ease forwards;
      }

      .profile-pic {
        width: 150px;
        height: 170px;
        object-fit: contain;
        margin-bottom: 2rem;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
      }

      h1 {
        margin: 0.3em 0;
        font-size: clamp(1.6rem, 4vw, 2rem);
      }

      p {
        color: #adaaa8;
        margin: 0.3em 0 1.2em 0;
      }

      .links {
        width: 90%;
        max-width: 340px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 40px;
        animation: fadeIn 0.6s ease forwards;
      }

      .link {
        display: grid;
        grid-template-columns: 40px 1fr 40px;
        align-items: center;
        background: #f0ecec;
        padding: 14px;
        border-radius: 14px;
        text-decoration: none;
        color: #222;
        font-weight: bold;
        transition: all 0.2s ease;
      }

      .link:hover {
        background: #ddd;
        filter: brightness(1.2);
        transform: translateY(-2px);
      }

      .link-logo {
        width: 22px;
        height: 22px;
        justify-self: center;
      }

      .link span {
        text-align: center;
      }

      footer {
        margin-top: auto;
        width: 100%;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.6),
          rgba(0, 0, 0, 0)
        );
        color: #9ca3af;
        text-align: center;
        padding: 14px 10px;
        font-size: 14px;
        animation: fadeIn 0.7s ease forwards;
      }

      footer span {
        color: #f0ecec;
        font-weight: bold;
      }

      footer a {
        color: #4da6ff;
        text-decoration: none;
      }

      footer a:hover {
        text-decoration: underline;
      }

      #titlecolor {
        color: red;
        text-shadow: 0 0 6px rgba(255, 0, 0, 0.5);
      }
      h4 {
        margin-top: 0;
      }
      hr {
        margin: 1px;
      }
      .line-text {
        display: flex;
        align-items: center;
        text-align: center;
      }

      .line-text::before,
      .line-text::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid #adaaa8;
      }

      .line-text::before {
        margin-right: 10px;
      }

      .line-text::after {
        margin-left: 10px;
      }

      /*Load Animation*/
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Mobile tweaks */

      @media (max-width: 800px) {
        .html,
        body {
          margin: 0;
          padding: 0;
          height: 100%;
          overflow: hidden;
        }
        .profile-pic {
          width: 140px;
          height: 130px;
        }

        .link {
          padding: 12px;
          font-size: 15px;
          margin-bottom: 0.25em;
        }
        h4 {
          margin-top: 0;
        }
        .line-text {
          display: flex;
          align-items: center;
          text-align: center;
        }

        .line-text::before,
        .line-text::after {
          content: "";
          flex: 1;
          border-bottom: 1px solid #adaaa8;
        }

        .line-text::before {
          margin-right: 10px;
        }

        .line-text::after {
          margin-left: 10px;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <img class="profile-pic" src="img/watch.logo.png" alt="Profile Picture" />

      <h1>WATCHTOWER <span id="titlecolor">91</span></h1>
      <h4><div class="line-text">SECURITY</div></h4>
      <p>Security Guard Service</p>

      <a href="https://maps.app.goo.gl/aKyELm8HrmkmQBta8">
        <p id="plink">📍410 Avenida Monte Sol, Fajardo, Puerto Rico</p>
      </a>
    </header>

    <div class="links">
      <a class="link" href="tel:+17873407000">
        <img class="link-logo" src="img/contact_logo.png" alt="Phone logo" />
        <span>Contact</span>
        <div></div>
      </a>

      <a class="link" href="mailto:watchtower091@gmail.com">
        <img class="link-logo" src="img/mail_logo.png" alt="Email logo" />
        <span>Email</span>
        <div></div>
      </a>

      <a class="link" href="https://facebook.com/watchtower91" target="_blank">
        <img class="link-logo" src="img/facebook.png" alt="Facebook logo" />
        <span>Facebook</span>
        <div></div>
      </a>

      <a
        class="link"
        href="https://instagram.com/watchtower91security"
        target="_blank"
      >
        <img class="link-logo" src="img/gram_logo.png" alt="Instagram logo" />
        <span>Instagram</span>
        <div></div>
      </a>
    </div>
    <footer>
      <p>© 2026 <span>ThriveNFC</span>. All Rights Reserved.</p>
    </footer>
  </body>
</html>
